<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#ffffff"/>

  <!-- Handle bar -->
  <rect x="3" y="4" width="26" height="2" rx="1" fill="#37474f"/>
  <!-- Handle uprights (far sides only, clear of cat) -->
  <rect x="3" y="6" width="2" height="13" rx="1" fill="#37474f"/>
  <rect x="27" y="6" width="2" height="13" rx="1" fill="#37474f"/>

  <!-- Cat head (drawn over handle, behind cart rail) -->
  <ellipse cx="16" cy="13" rx="8" ry="7.5" fill="#e87d2a"/>

  <!-- Ears outer -->
  <polygon points="9,10 7,5 13,9" fill="#e87d2a"/>
  <polygon points="23,10 25,5 19,9" fill="#e87d2a"/>
  <!-- Ears inner -->
  <polygon points="9.5,9.5 8,6.5 12.5,8.8" fill="#f09060"/>
  <polygon points="22.5,9.5 24,6.5 19.5,8.8" fill="#f09060"/>

  <!-- Cart top rail (over handle uprights) -->
  <rect x="5" y="18.5" width="22" height="2.5" rx="1.2" fill="#546e7a"/>

  <!-- Paws on rail -->
  <ellipse cx="9.5" cy="19" rx="2.8" ry="1.5" fill="#e87d2a"/>
  <ellipse cx="22.5" cy="19" rx="2.8" ry="1.5" fill="#e87d2a"/>

  <!-- Cart interior (light blue so cat body is visible) -->
  <rect x="7" y="21" width="18" height="7" rx="1" fill="#dce8f0"/>

  <!-- Cat body inside (orange, clipped to interior) -->
  <clipPath id="bc">
    <rect x="7" y="21" width="18" height="7"/>
  </clipPath>
  <g clip-path="url(#bc)">
    <ellipse cx="16" cy="25" rx="10" ry="7" fill="#e87d2a"/>
    <ellipse cx="16" cy="27" rx="6" ry="5" fill="#f5c490"/>
  </g>

  <!-- Wire mesh on top -->
  <line x1="7" y1="25.5" x2="25" y2="25.5" stroke="#607d8b" stroke-width="1"/>
  <line x1="13.5" y1="21" x2="13.5" y2="28" stroke="#607d8b" stroke-width="1"/>
  <line x1="18.5" y1="21" x2="18.5" y2="28" stroke="#607d8b" stroke-width="1"/>

  <!-- Cart sides -->
  <rect x="5" y="18.5" width="2" height="10" rx="1" fill="#546e7a"/>
  <rect x="25" y="18.5" width="2" height="10" rx="1" fill="#546e7a"/>
  <!-- Cart bottom -->
  <rect x="5" y="27.5" width="22" height="2" rx="1" fill="#546e7a"/>

  <!-- Wheels -->
  <circle cx="9" cy="30.5" r="2" fill="#37474f"/>
  <circle cx="23" cy="30.5" r="2" fill="#37474f"/>

  <!-- Eye whites -->
  <ellipse cx="12.8" cy="12.5" rx="2.2" ry="2.8" fill="white"/>
  <ellipse cx="19.2" cy="12.5" rx="2.2" ry="2.8" fill="white"/>
  <!-- Pupils -->
  <ellipse cx="12.8" cy="13" rx="1" ry="2.2" fill="#1a1008"/>
  <ellipse cx="19.2" cy="13" rx="1" ry="2.2" fill="#1a1008"/>
  <!-- Eye shine -->
  <circle cx="13.5" cy="11.5" r="0.7" fill="white"/>
  <circle cx="19.9" cy="11.5" r="0.7" fill="white"/>

  <!-- Muzzle -->
  <ellipse cx="16" cy="15.5" rx="3" ry="2.2" fill="#f5c490"/>
  <!-- Nose -->
  <polygon points="16,14.5 15.2,15.5 16.8,15.5" fill="#e85a7a"/>
</svg>
