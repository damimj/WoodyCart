<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420">
  <!-- Background -->
  <rect width="420" height="420" fill="#ffffff" rx="84"/>

  <!-- ===== HANDLE (drawn first, behind cat) ===== -->
  <!-- Horizontal push bar -->
  <rect x="52" y="50" width="316" height="12" rx="6" fill="#37474f"/>
  <!-- Left upright -->
  <rect x="52" y="62" width="13" height="180" rx="5" fill="#37474f"/>
  <!-- Right upright -->
  <rect x="355" y="62" width="13" height="180" rx="5" fill="#37474f"/>

  <!-- ===== CAT HEAD (drawn over handle uprights) ===== -->
  <ellipse cx="210" cy="188" rx="76" ry="72" fill="#e87d2a"/>

  <!-- Ears outer -->
  <polygon points="144,128 122,68 178,122" fill="#e87d2a"/>
  <polygon points="276,128 298,68 242,122" fill="#e87d2a"/>
  <!-- Ears inner -->
  <polygon points="147,124 132,84 174,120" fill="#f09060"/>
  <polygon points="273,124 288,84 246,120" fill="#f09060"/>

  <!-- Head stripes -->
  <path d="M180,112 Q210,104 240,112" stroke="#c4601a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M174,130 Q210,122 246,130" stroke="#c4601a" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Muzzle -->
  <ellipse cx="210" cy="218" rx="32" ry="24" fill="#f5c490"/>

  <!-- Left eye -->
  <ellipse cx="184" cy="188" rx="16" ry="19" fill="white"/>
  <ellipse cx="184" cy="190" rx="7" ry="15" fill="#1a1008"/>
  <circle cx="188" cy="183" r="4" fill="white"/>

  <!-- Right eye -->
  <ellipse cx="236" cy="188" rx="16" ry="19" fill="white"/>
  <ellipse cx="236" cy="190" rx="7" ry="15" fill="#1a1008"/>
  <circle cx="240" cy="183" r="4" fill="white"/>

  <!-- Nose -->
  <polygon points="210,210 204,217 216,217" fill="#e85a7a"/>
  <!-- Mouth -->
  <path d="M204,218 Q210,226 216,218" stroke="#c4601a" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="178" y1="213" x2="136" y2="205" stroke="#6e5040" stroke-width="1.8"/>
  <line x1="178" y1="220" x2="134" y2="220" stroke="#6e5040" stroke-width="1.8"/>
  <line x1="178" y1="227" x2="138" y2="234" stroke="#6e5040" stroke-width="1.8"/>
  <line x1="242" y1="213" x2="284" y2="205" stroke="#6e5040" stroke-width="1.8"/>
  <line x1="242" y1="220" x2="286" y2="220" stroke="#6e5040" stroke-width="1.8"/>
  <line x1="242" y1="227" x2="282" y2="234" stroke="#6e5040" stroke-width="1.8"/>

  <!-- ===== CART TOP RAIL (connects handle uprights to cart body) ===== -->
  <rect x="65" y="242" width="290" height="13" rx="6" fill="#546e7a"/>

  <!-- Paws resting on top rail -->
  <ellipse cx="144" cy="244" rx="27" ry="14" fill="#e87d2a"/>
  <ellipse cx="144" cy="241" rx="18" ry="9" fill="#f5c490"/>
  <ellipse cx="276" cy="244" rx="27" ry="14" fill="#e87d2a"/>
  <ellipse cx="276" cy="241" rx="18" ry="9" fill="#f5c490"/>

  <!-- ===== CART BASKET ===== -->

  <!-- Interior background: light blue so orange cat pops out -->
  <rect x="78" y="255" width="264" height="107" fill="#dce8f0"/>

  <!-- Cat body inside cart (clipped to interior) -->
  <clipPath id="basketClip">
    <rect x="78" y="255" width="264" height="107"/>
  </clipPath>
  <g clip-path="url(#basketClip)">
    <ellipse cx="210" cy="312" rx="115" ry="95" fill="#e87d2a"/>
    <ellipse cx="210" cy="332" rx="72" ry="58" fill="#f5c490"/>
    <path d="M168,272 Q210,262 252,272" stroke="#c4601a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M160,294 Q210,284 260,294" stroke="#c4601a" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Wire mesh drawn ON TOP of cat body -->
  <line x1="79" y1="286" x2="341" y2="286" stroke="#607d8b" stroke-width="2.5"/>
  <line x1="79" y1="320" x2="341" y2="320" stroke="#607d8b" stroke-width="2.5"/>
  <line x1="140" y1="255" x2="140" y2="362" stroke="#607d8b" stroke-width="2.5"/>
  <line x1="200" y1="255" x2="200" y2="362" stroke="#607d8b" stroke-width="2.5"/>
  <line x1="260" y1="255" x2="260" y2="362" stroke="#607d8b" stroke-width="2.5"/>
  <line x1="320" y1="255" x2="320" y2="362" stroke="#607d8b" stroke-width="2.5"/>

  <!-- Cart side uprights -->
  <rect x="65" y="242" width="13" height="122" rx="5" fill="#546e7a"/>
  <rect x="342" y="242" width="13" height="122" rx="5" fill="#546e7a"/>

  <!-- Cart bottom rail -->
  <rect x="65" y="362" width="290" height="12" rx="5" fill="#546e7a"/>

  <!-- ===== WHEELS AND AXLE ===== -->
  <!-- Axle bar -->
  <rect x="72" y="374" width="276" height="9" rx="4" fill="#546e7a"/>

  <!-- Left wheel support -->
  <rect x="90" y="374" width="10" height="24" rx="4" fill="#546e7a"/>
  <!-- Right wheel support -->
  <rect x="320" y="374" width="10" height="24" rx="4" fill="#546e7a"/>

  <!-- Left wheel -->
  <circle cx="95" cy="408" r="20" fill="#37474f" stroke="#263238" stroke-width="2.5"/>
  <circle cx="95" cy="408" r="10" fill="#546e7a"/>
  <circle cx="95" cy="408" r="4" fill="#263238"/>
  <line x1="95" y1="388" x2="95" y2="428" stroke="#263238" stroke-width="2"/>
  <line x1="75" y1="408" x2="115" y2="408" stroke="#263238" stroke-width="2"/>
  <line x1="81" y1="394" x2="109" y2="422" stroke="#263238" stroke-width="1.5"/>
  <line x1="109" y1="394" x2="81" y2="422" stroke="#263238" stroke-width="1.5"/>

  <!-- Right wheel -->
  <circle cx="325" cy="408" r="20" fill="#37474f" stroke="#263238" stroke-width="2.5"/>
  <circle cx="325" cy="408" r="10" fill="#546e7a"/>
  <circle cx="325" cy="408" r="4" fill="#263238"/>
  <line x1="325" y1="388" x2="325" y2="428" stroke="#263238" stroke-width="2"/>
  <line x1="305" y1="408" x2="345" y2="408" stroke="#263238" stroke-width="2"/>
  <line x1="311" y1="394" x2="339" y2="422" stroke="#263238" stroke-width="1.5"/>
  <line x1="339" y1="394" x2="311" y2="422" stroke="#263238" stroke-width="1.5"/>

  <!-- ===== TAIL ===== -->
  <path d="M342,320 Q398,285 385,232 Q374,196 348,210"
        stroke="#e87d2a" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M342,320 Q398,285 385,232 Q374,196 348,210"
        stroke="#c4601a" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="6 10"/>
  <ellipse cx="346" cy="212" rx="13" ry="9" fill="#e87d2a" transform="rotate(-22,346,212)"/>
</svg>
